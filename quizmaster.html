<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmaster Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            color: #ecf0f1;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #bdc3c7;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(52, 73, 94, 0.8);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid #34495e;
        }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e74c3c;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }

        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-status {
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .status-inactive {
            background: #e74c3c;
            color: white;
        }

        .status-active {
            background: #27ae60;
            color: white;
        }

        .question-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .question-item {
            background: rgba(44, 62, 80, 0.6);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .question-item:hover {
            border-color: #3498db;
            transform: translateY(-2px);
        }

        .question-item.current {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.2);
        }

        .question-item.selected {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 8px;
            color: #ecf0f1;
        }

        .question-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .option-tag {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .question-type {
            font-size: 0.8rem;
            color: #95a5a6;
        }

        .btn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }

        .btn-warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
        }

        .btn-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .timer-input {
            padding: 10px;
            border: 2px solid #34495e;
            border-radius: 5px;
            background: #2c3e50;
            color: white;
            font-size: 1rem;
            width: 80px;
        }

        .timer-display {
            font-size: 2rem;
            font-weight: bold;
            color: #e74c3c;
            min-width: 80px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(52, 73, 94, 0.8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #34495e;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .participants-list {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(44, 62, 80, 0.6);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .participant-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #34495e;
        }

        .participant-item:last-child {
            border-bottom: none;
        }

        .participant-name {
            color: #ecf0f1;
        }

        .participant-status {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 5px;
        }

        .status-active {
            background: #27ae60;
            color: white;
        }

        .status-inactive {
            background: #95a5a6;
            color: white;
        }

        .answer-breakdown {
            margin-top: 20px;
        }

        .answer-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(44, 62, 80, 0.6);
            border-radius: 8px;
        }

        .answer-count {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .title {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎯 Quizmaster Control</div>
            <div class="subtitle">Manage your poll questions and monitor participants</div>
        </div>

        <div class="main-content">
            <!-- Game Control Panel -->
            <div class="panel">
                <div class="panel-title">Game Controls</div>
                
                <div id="gameStatus" class="game-status status-inactive">
                    Game Inactive
                </div>

                <div class="timer-section">
                    <label>Timer:</label>
                    <input type="number" id="timerInput" class="timer-input" value="45" min="10" max="300">
                    <span>seconds</span>
                    <div id="timerDisplay" class="timer-display">45</div>
                </div>

                <div class="game-controls">
                    <button id="startQuestionBtn" class="btn btn-success" disabled>
                        Start Selected Question
                    </button>
                    <button id="stopQuestionBtn" class="btn btn-danger" disabled>
                        Stop Current Question
                    </button>
                    <button id="nextQuestionBtn" class="btn btn-warning" disabled>
                        Next Question
                    </button>
                    <button id="resetGameBtn" class="btn btn-danger">
                        Reset Game
                    </button>
                </div>

                <div class="answer-breakdown" id="answerBreakdown">
                    <h4>Current Question Results:</h4>
                    <div id="answerList"></div>
                </div>
            </div>

            <!-- Questions Panel -->
            <div class="panel">
                <div class="panel-title">Questions</div>
                <div id="questionList" class="question-list">
                    <!-- Questions will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div id="totalParticipants" class="stat-number">0</div>
                <div class="stat-label">Total Participants</div>
            </div>
            <div class="stat-card">
                <div id="activeParticipants" class="stat-number">0</div>
                <div class="stat-label">Active Participants</div>
            </div>
            <div class="stat-card">
                <div id="currentAnswers" class="stat-number">0</div>
                <div class="stat-label">Current Answers</div>
            </div>
            <div class="stat-card">
                <div id="currentQuestionNum" class="stat-number">-</div>
                <div class="stat-label">Current Question</div>
            </div>
        </div>

        <!-- Participants List -->
        <div class="panel" style="margin-top: 30px;">
            <div class="panel-title">Participants</div>
            <div id="participantsList" class="participants-list">
                <!-- Participants will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration - Replace with your actual config
        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com/",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "your-app-id"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let questions = [];
        let selectedQuestionId = null;
        let currentGameState = null;
        let participants = {};
        let timerInterval = null;

        // DOM Elements
        const gameStatus = document.getElementById('gameStatus');
        const timerInput = document.getElementById('timerInput');
        const timerDisplay = document.getElementById('timerDisplay');
        const startQuestionBtn = document.getElementById('startQuestionBtn');
        const stopQuestionBtn = document.getElementById('stopQuestionBtn');
        const nextQuestionBtn = document.getElementById('nextQuestionBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');
        const questionList = document.getElementById('questionList');
        const answerBreakdown = document.getElementById('answerBreakdown');
        const answerList = document.getElementById('answerList');
        const totalParticipants = document.getElementById('totalParticipants');
        const activeParticipants = document.getElementById('activeParticipants');
        const currentAnswers = document.getElementById('currentAnswers');
        const currentQuestionNum = document.getElementById('currentQuestionNum');
        const participantsList = document.getElementById('participantsList');

        function init() {
            loadQuestions();
            listenForGameChanges();
            listenForParticipants();
            setupEventListeners();
        }

        function setupEventListeners() {
            startQuestionBtn.addEventListener('click', startQuestion);
            stopQuestionBtn.addEventListener('click', stopQuestion);
            nextQuestionBtn.addEventListener('click', nextQuestion);
            resetGameBtn.addEventListener('click', resetGame);
            timerInput.addEventListener('change', updateTimerDisplay);
        }

        function loadQuestions() {
            database.ref('questions').on('value', (snapshot) => {
                questions = [];
                const questionsData = snapshot.val();
                
                if (questionsData) {
                    if (Array.isArray(questionsData)) {
                        questions = questionsData;
                    } else {
                        questions = Object.values(questionsData);
                    }
                }
                
                renderQuestions();
            });
        }

        function renderQuestions() {
            questionList.innerHTML = '';
            
            questions.forEach((question, index) => {
                const questionItem = document.createElement('div');
                questionItem.className = 'question-item';
                questionItem.dataset.questionId = index;
                
                if (currentGameState && currentGameState.currentQuestion === index) {
                    questionItem.classList.add('current');
                }
                
                if (selectedQuestionId === index) {
                    questionItem.classList.add('selected');
                }

                questionItem.innerHTML = `
                    <div class="question-text">${question.text}</div>
                    <div class="question-options">
                        ${question.options.map(option => `<span class="option-tag">${option}</span>`).join('')}
                    </div>
                    <div class="question-type">${question.type} • Question ${index + 1}</div>
                `;

                questionItem.addEventListener('click', () => selectQuestion(index));
                questionList.appendChild(questionItem);
            });
        }

        function selectQuestion(questionId) {
            selectedQuestionId = questionId;
            renderQuestions();
            updateButtonStates();
        }

        function listenForGameChanges() {
            database.ref('game').on('value', (snapshot) => {
                currentGameState = snapshot.val();
                if (!currentGameState) {
                    currentGameState = {
                        currentQuestion: -1,
                        isActive: false,
                        timeRemaining: 45
                    };
                }
                
                updateGameStatus();
                updateButtonStates();
                updateStats();
                renderQuestions();
                
                if (currentGameState.isActive && currentGameState.currentQuestion >= 0) {
                    startTimer(currentGameState.timeRemaining);
                    loadCurrentAnswers();
                } else {
                    stopTimer();
                    clearAnswerBreakdown();
                }
            });
        }

        function listenForParticipants() {
            database.ref('participants').on('value', (snapshot) => {
                participants = snapshot.val() || {};
                updateStats();
                renderParticipants();
            });
        }

        function updateGameStatus() {
            if (currentGameState.isActive) {
                gameStatus.textContent = `Question ${currentGameState.currentQuestion + 1} Active`;
                gameStatus.className = 'game-status status-active';
            } else {
                gameStatus.textContent = 'Game Inactive';
                gameStatus.className = 'game-status status-inactive';
            }
        }

        function updateButtonStates() {
            const hasSelectedQuestion = selectedQuestionId !== null;
            const isGameActive = currentGameState && currentGameState.isActive;
            
            startQuestionBtn.disabled = !hasSelectedQuestion || isGameActive;
            stopQuestionBtn.disabled = !isGameActive;
            nextQuestionBtn.disabled = !isGameActive || selectedQuestionId === null || selectedQuestionId >= questions.length - 1;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = timerInput.value;
        }

        function startQuestion() {
            if (selectedQuestionId === null) return;
            
            const gameData = {
                currentQuestion: selectedQuestionId,
                isActive: true,
                timeRemaining: parseInt(timerInput.value)
            };
            
            database.ref('game').set(gameData);
        }

        function stopQuestion() {
            database.ref('game').update({
                isActive: false
            });
        }

        function nextQuestion() {
            if (selectedQuestionId === null || selectedQuestionId >= questions.length - 1) return;
            
            const nextQuestionId = selectedQuestionId + 1;
            selectedQuestionId = nextQuestionId;
            
            const gameData = {
                currentQuestion: nextQuestionId,
                isActive: true,
                timeRemaining: parseInt(timerInput.value)
            };
            
            database.ref('game').set(gameData);
        }

        function resetGame() {
            if (confirm('Are you sure you want to reset the game? This will clear all answers.')) {
                database.ref('game').set({
                    currentQuestion: -1,
                    isActive: false,
                    timeRemaining: 45
                });
                
                database.ref('answers').remove();
                selectedQuestionId = null;
                renderQuestions();
            }
        }

        function startTimer(duration) {
            stopTimer();
            let timeLeft = duration;
            
            timerInterval = setInterval(() => {
                timerDisplay.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    stopTimer();
                    stopQuestion();
                    return;
                }
                
                // Update database every 5 seconds
                if (timeLeft % 5 === 0) {
                    database.ref('game/timeRemaining').set(timeLeft);
                }
                
                timeLeft--;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function loadCurrentAnswers() {
            if (currentGameState.currentQuestion >= 0) {
                database.ref(`answers/${currentGameState.currentQuestion}`).on('value', (snapshot) => {
                    const answers = snapshot.val() || {};
                    renderAnswerBreakdown(answers);
                    updateStats();
                });
            }
        }

        function renderAnswerBreakdown(answers) {
            if (currentGameState.currentQuestion < 0 || currentGameState.currentQuestion >= questions.length) {
                clearAnswerBreakdown();
                return;
            }
            
            const currentQuestion = questions[currentGameState.currentQuestion];
            const answerCounts = {};
            
            // Initialize counts
            currentQuestion.options.forEach(option => {
                answerCounts[option] = 0;
            });
            
            // Count answers
            Object.values(answers).forEach(answer => {
                if (answerCounts.hasOwnProperty(answer)) {
                    answerCounts[answer]++;
                }
            });
            
            // Render breakdown
            answerList.innerHTML = '';
            Object.entries(answerCounts).forEach(([option, count]) => {
                const answerOption = document.createElement('div');
                answerOption.className = 'answer-option';
                answerOption.innerHTML = `
                    <span>${option}</span>
                    <span class="answer-count">${count}</span>
                `;
                answerList.appendChild(answerOption);
            });
        }

        function clearAnswerBreakdown() {
            answerList.innerHTML = '<div style="color: #95a5a6; text-align: center;">No active question</div>';
        }

        function updateStats() {
            const total = Object.keys(participants).length;
            const active = Object.values(participants).filter(p => p.isActive).length;
            
            totalParticipants.textContent = total;
            activeParticipants.textContent = active;
            
            if (currentGameState && currentGameState.currentQuestion >= 0) {
                currentQuestionNum.textContent = currentGameState.currentQuestion + 1;
                
                database.ref(`answers/${currentGameState.currentQuestion}`).once('value', (snapshot) => {
                    const answers = snapshot.val() || {};
                    currentAnswers.textContent = Object.keys(answers).length;
                });
            } else {
                currentQuestionNum.textContent = '-';
                currentAnswers.textContent = '0';
            }
        }

        function renderParticipants() {
            participantsList.innerHTML = '';
            
            Object.entries(participants).forEach(([id, participant]) => {
                const participantItem = document.createElement('div');
                participantItem.className = 'participant-item';
                
                participantItem.innerHTML = `
                    <span class="participant-name">${participant.name}</span>
                    <span class="participant-status ${participant.isActive ? 'status-active' : 'status-inactive'}">
                        ${participant.isActive ? 'Active' : 'Inactive'}
                    </span>
                `;
                
                participantsList.appendChild(participantItem);
            });
        }

        // Initialize the app when the page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
