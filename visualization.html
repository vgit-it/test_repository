<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Visualization</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-areas: 
                "option1 option2"
                "option3 option4";
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
        }

        .container.two-options {
            grid-template-areas: 
                "option1 option2";
            grid-template-rows: 1fr;
            grid-template-columns: 1fr 1fr;
        }

        .quadrant {
            position: relative;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .quadrant::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .quadrant-text {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 80%;
            text-align: center;
        }

        .option1 {
            grid-area: option1;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        }

        .option2 {
            grid-area: option2;
            background: linear-gradient(135deg, #4ecdc4, #7fdbda);
        }

        .option3 {
            grid-area: option3;
            background: linear-gradient(135deg, #45b7d1, #96ceb4);
        }

        .option4 {
            grid-area: option4;
            background: linear-gradient(135deg, #f7dc6f, #bb8fce);
        }

        .question-overlay {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            z-index: 100;
            max-width: 80%;
            border: 2px solid #fff;
        }

        .character {
            position: absolute;
            width: 30px;
            height: 40px;
            z-index: 10;
            transition: none;
            pointer-events: none;
        }

        .character-head {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffd700;
            border: 2px solid #333;
            position: absolute;
            top: 0;
            left: 5px;
        }

        .character-torso {
            width: 24px;
            height: 20px;
            border-radius: 8px;
            position: absolute;
            top: 18px;
            left: 3px;
            border: 2px solid #333;
        }

        .character-name {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 11;
        }

        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 14px;
        }

        .waiting-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .waiting-text {
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="waitingScreen" class="waiting-screen">
        <div class="waiting-text pulse">🗳️ Poll Visualization</div>
        <div>Waiting for quiz to start...</div>
    </div>

    <div id="mainContent" class="hidden">
        <div id="questionOverlay" class="question-overlay hidden"></div>
        
        <div id="container" class="container">
            <div class="quadrant option1" data-option="0">
                <div class="quadrant-text" id="option1Text"></div>
            </div>
            <div class="quadrant option2" data-option="1">
                <div class="quadrant-text" id="option2Text"></div>
            </div>
            <div class="quadrant option3" data-option="2">
                <div class="quadrant-text" id="option3Text"></div>
            </div>
            <div class="quadrant option4" data-option="3">
                <div class="quadrant-text" id="option4Text"></div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div>Active Participants: <span id="participantCount">0</span></div>
            <div>Answers Submitted: <span id="answerCount">0</span></div>
        </div>
    </div>

    <script>
        // Firebase Configuration - Replace with your actual config
        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com/",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "your-app-id"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Character movement settings
        const MOVEMENT_SPEED = 2; // pixels per frame
        const WIGGLE_SPEED = 0.5;
        const COLLISION_RADIUS = 20;
        const SPAWN_POINT = { x: window.innerWidth / 2, y: window.innerHeight - 50 };

        // Character colors for variety
        const TORSO_COLORS = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f7dc6f', '#bb8fce', '#ff8e8e', '#7fdbda', '#96ceb4'];

        let currentQuestion = null;
        let characters = new Map(); // participantId -> character object
        let animationFrame = null;
        let quadrantBounds = {};

        // DOM Elements
        const waitingScreen = document.getElementById('waitingScreen');
        const mainContent = document.getElementById('mainContent');
        const questionOverlay = document.getElementById('questionOverlay');
        const container = document.getElementById('container');
        const participantCount = document.getElementById('participantCount');
        const answerCount = document.getElementById('answerCount');

        class Character {
            constructor(participantId, name, targetQuadrant) {
                this.id = participantId;
                this.name = name;
                this.x = SPAWN_POINT.x;
                this.y = SPAWN_POINT.y;
                this.targetX = 0;
                this.targetY = 0;
                this.targetQuadrant = targetQuadrant;
                this.isMoving = false;
                this.wiggleOffset = Math.random() * Math.PI * 2;
                this.torsoColor = TORSO_COLORS[Math.floor(Math.random() * TORSO_COLORS.length)];
                this.torsoFrame = 0;
                this.element = null;
                this.hasReachedTarget = false;
                
                this.createElement();
                this.setTarget(targetQuadrant);
            }

            createElement() {
                this.element = document.createElement('div');
                this.element.className = 'character';
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';

                const head = document.createElement('div');
                head.className = 'character-head';

                const torso = document.createElement('div');
                torso.className = 'character-torso';
                torso.style.background = this.torsoColor;

                const nameLabel = document.createElement('div');
                nameLabel.className = 'character-name';
                nameLabel.textContent = this.name.split(' ')[0]; // First name only

                this.element.appendChild(head);
                this.element.appendChild(torso);
                this.element.appendChild(nameLabel);

                document.body.appendChild(this.element);
            }

            setTarget(quadrantIndex) {
                this.targetQuadrant = quadrantIndex;
                
                if (quadrantBounds[quadrantIndex]) {
                    const bounds = quadrantBounds[quadrantIndex];
                    // Random position within the quadrant (with some margin)
                    const margin = 50;
                    this.targetX = bounds.left + margin + Math.random() * (bounds.width - margin * 2);
                    this.targetY = bounds.top + margin + Math.random() * (bounds.height - margin * 2);
                    this.isMoving = true;
                    this.hasReachedTarget = false;
                }
            }

            update() {
                if (this.isMoving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance > MOVEMENT_SPEED) {
                        // Move towards target
                        this.x += (dx / distance) * MOVEMENT_SPEED;
                        this.y += (dy / distance) * MOVEMENT_SPEED;
                        
                        // Animate torso (walking animation)
                        this.torsoFrame += 0.2;
                        const scale = 1 + Math.sin(this.torsoFrame) * 0.1;
                        this.element.querySelector('.character-torso').style.transform = `scaleX(${scale})`;
                    } else {
                        // Reached target
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.isMoving = false;
                        this.hasReachedTarget = true;
                        this.element.querySelector('.character-torso').style.transform = 'scaleX(1)';
                    }
                } else if (this.hasReachedTarget) {
                    // Wiggle animation when stationary
                    this.wiggleOffset += WIGGLE_SPEED;
                    const wiggleX = Math.sin(this.wiggleOffset) * 1;
                    const wiggleY = Math.cos(this.wiggleOffset * 1.3) * 0.5;
                    
                    this.element.style.left = (this.x + wiggleX) + 'px';
                    this.element.style.top = (this.y + wiggleY) + 'px';
                    return; // Don't update position below
                }

                // Handle collisions with other characters
                this.handleCollisions();

                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
            }

            handleCollisions() {
                for (let [id, other] of characters) {
                    if (id === this.id) continue;
                    
                    const dx = this.x - other.x;
                    const dy = this.y - other.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < COLLISION_RADIUS && distance > 0) {
                        // Push characters apart
                        const pushForce = (COLLISION_RADIUS - distance) / 2;
                        const pushX = (dx / distance) * pushForce;
                        const pushY = (dy / distance) * pushForce;
                        
                        this.x += pushX;
                        this.y += pushY;
                        other.x -= pushX;
                        other.y -= pushY;
                    }
                }
            }

            destroy() {
                if (this.element) {
                    this.element.remove();
                }
            }
        }

        function init() {
            calculateQuadrantBounds();
            listenForGameChanges();
            startAnimation();
        }

        function calculateQuadrantBounds() {
            const quadrants = document.querySelectorAll('.quadrant');
            quadrants.forEach((quadrant, index) => {
                const rect = quadrant.getBoundingClientRect();
                quadrantBounds[index] = {
                    left: rect.left,
                    top: rect.top,
                    width: rect.width,
                    height: rect.height
                };
            });
        }

        function listenForGameChanges() {
            // Listen for game state
            database.ref('game').on('value', (snapshot) => {
                const gameData = snapshot.val();
                if (!gameData) return;

                if (gameData.isActive && gameData.currentQuestion >= 0) {
                    loadQuestion(gameData.currentQuestion);
                    showMainContent();
                } else {
                    showWaitingScreen();
                }
            });

            // Listen for participant changes
            database.ref('participants').on('value', (snapshot) => {
                const participants = snapshot.val();
                if (participants) {
                    const activeCount = Object.values(participants).filter(p => p.isActive).length;
                    participantCount.textContent = activeCount;
                }
            });
        }

        function loadQuestion(questionId) {
            database.ref(`questions/${questionId}`).once('value', (snapshot) => {
                const questionData = snapshot.val();
                if (!questionData) return;

                currentQuestion = questionData;
                
                // Update UI
                questionOverlay.textContent = questionData.text;
                questionOverlay.classList.remove('hidden');

                // Update quadrant layout
                if (questionData.type === '2-option') {
                    container.className = 'container two-options';
                    document.querySelector('.option3').style.display = 'none';
                    document.querySelector('.option4').style.display = 'none';
                } else {
                    container.className = 'container';
                    document.querySelector('.option3').style.display = 'flex';
                    document.querySelector('.option4').style.display = 'flex';
                }

                // Update option texts
                questionData.options.forEach((option, index) => {
                    const textElement = document.getElementById(`option${index + 1}Text`);
                    if (textElement) {
                        textElement.textContent = option;
                    }
                });

                // Recalculate bounds after layout change
                setTimeout(() => {
                    calculateQuadrantBounds();
                }, 100);

                // Listen for answers
                listenForAnswers(questionId);
            });
        }

        function listenForAnswers(questionId) {
            database.ref(`answers/${questionId}`).on('value', (snapshot) => {
                const answers = snapshot.val();
                if (!answers) {
                    answerCount.textContent = 0;
                    return;
                }

                answerCount.textContent = Object.keys(answers).length;

                // Get participant data
                database.ref('participants').once('value', (participantsSnapshot) => {
                    const participants = participantsSnapshot.val();
                    if (!participants) return;

                    // Update or create characters based on answers
                    Object.entries(answers).forEach(([participantId, answer]) => {
                        const participant = participants[participantId];
                        if (!participant || !participant.isActive) return;

                        const optionIndex = currentQuestion.options.indexOf(answer);
                        if (optionIndex === -1) return;

                        if (characters.has(participantId)) {
                            // Update existing character's target
                            const character = characters.get(participantId);
                            if (character.targetQuadrant !== optionIndex) {
                                character.setTarget(optionIndex);
                            }
                        } else {
                            // Create new character
                            const character = new Character(participantId, participant.name, optionIndex);
                            characters.set(participantId, character);
                        }
                    });

                    // Remove characters for participants who are no longer active or answered
                    for (let [participantId, character] of characters) {
                        const participant = participants[participantId];
                        if (!participant || !participant.isActive || !answers[participantId]) {
                            character.destroy();
                            characters.delete(participantId);
                        }
                    }
                });
            });
        }

        function showMainContent() {
            waitingScreen.classList.add('hidden');
            mainContent.classList.remove('hidden');
        }

        function showWaitingScreen() {
            waitingScreen.classList.remove('hidden');
            mainContent.classList.add('hidden');
            questionOverlay.classList.add('hidden');
            
            // Clear all characters
            for (let [id, character] of characters) {
                character.destroy();
            }
            characters.clear();
        }

        function startAnimation() {
            function animate() {
                for (let [id, character] of characters) {
                    character.update();
                }
                animationFrame = requestAnimationFrame(animate);
            }
            animate();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            setTimeout(() => {
                calculateQuadrantBounds();
                SPAWN_POINT.x = window.innerWidth / 2;
                SPAWN_POINT.y = window.innerHeight - 50;
            }, 100);
        });

        // Initialize the app when the page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
