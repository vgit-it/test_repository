<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Participation</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .name-selection {
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .name-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .name-item {
            padding: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .name-item:hover {
            background-color: #f5f5f5;
        }

        .name-item.selected {
            background-color: #667eea;
            color: white;
        }

        .name-item:last-child {
            border-bottom: none;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .game-area {
            display: none;
        }

        .question {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #333;
        }

        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .options.two-options {
            grid-template-columns: 1fr 1fr;
        }

        .options.four-options {
            grid-template-columns: 1fr 1fr;
        }

        .option {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .option:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .waiting {
            color: #6c757d;
        }

        .active {
            color: #28a745;
            background: #d4edda;
        }

        .submitted {
            color: #007bff;
            background: #d1ecf1;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🗳️ Poll Quiz</div>
        
        <!-- Name Selection Phase -->
        <div id="nameSelection" class="name-selection">
            <h2>Select Your Name</h2>
            <input type="text" id="searchBox" class="search-box" placeholder="Search for your name...">
            <div id="nameList" class="name-list"></div>
            <button id="confirmBtn" class="btn" disabled>Confirm & Enter Game</button>
        </div>

        <!-- Game Area -->
        <div id="gameArea" class="game-area">
            <div id="status" class="status waiting">Waiting for next question...</div>
            <div id="timer" class="timer hidden"></div>
            <div id="question" class="question"></div>
            <div id="options" class="options"></div>
            <div id="submissionStatus" class="hidden"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration - Replace with your actual config
        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com/",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "your-app-id"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sample participant names
        const participantNames = [
            "Alice Johnson", "Bob Smith", "Charlie Brown", "Diana Prince", "Edward Jones",
            "Fiona Davis", "George Wilson", "Hannah Lee", "Ian Clark", "Julia Roberts",
            "Kevin Hart", "Luna Martinez", "Mike Johnson", "Nina Patel", "Oliver Stone",
            "Penny Lane", "Quinn Taylor", "Rachel Green", "Sam Wilson", "Tina Turner",
            "Uma Thurman", "Victor Hugo", "Wendy Davis", "Xavier Lopez", "Yuki Tanaka",
            "Zoe Adams", "Alex Morgan", "Blake Lively", "Casey Anthony", "Derek Jeter",
            "Emma Stone", "Frank Miller", "Grace Kelly", "Henry Ford", "Iris West",
            "Jack Ryan", "Kate Winslet", "Liam Neeson", "Maya Angelou", "Noah Smith",
            "Olivia Wilde", "Paul Walker", "Queen Latifah", "Ryan Reynolds", "Sofia Vergara",
            "Tom Hanks", "Ursula Burns", "Violet Baudelaire", "Will Smith", "Xander Cage",
            "Yasmin Khan", "Zachary Levi", "Aria Montgomery", "Blake Griffin", "Chloe Bennett",
            "Dylan O'Brien", "Elena Gilbert", "Felix Baumgartner", "Gina Rodriguez", "Hunter Hayes",
            "Isabella Swan", "Jacob Black", "Katniss Everdeen", "Lydia Martin", "Mason Jar",
            "Natalie Portman", "Oscar Isaac", "Peyton Manning", "Quincy Jones", "Ruby Rose",
            "Sebastian Stan", "Taylor Swift", "Ulysses Grant", "Victoria Beckham", "Wolfgang Mozart",
            "Xenia Onatopp", "Yvonne Strahovski", "Zendaya Coleman", "Abigail Adams", "Benjamin Franklin"
        ];

        let selectedName = '';
        let participantId = '';
        let currentQuestion = null;
        let timeRemaining = 0;
        let timerInterval = null;
        let selectedAnswer = '';

        // DOM Elements
        const nameSelection = document.getElementById('nameSelection');
        const gameArea = document.getElementById('gameArea');
        const searchBox = document.getElementById('searchBox');
        const nameList = document.getElementById('nameList');
        const confirmBtn = document.getElementById('confirmBtn');
        const status = document.getElementById('status');
        const timer = document.getElementById('timer');
        const question = document.getElementById('question');
        const options = document.getElementById('options');

        // Initialize the app
        function init() {
            renderNameList(participantNames);
            setupEventListeners();
            initializeFirebaseData();
        }

        function initializeFirebaseData() {
            // Initialize sample data if it doesn't exist
            database.ref('participants').once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    const participants = {};
                    participantNames.forEach((name, index) => {
                        participants[`participant_${index}`] = {
                            name: name,
                            isActive: false
                        };
                    });
                    database.ref('participants').set(participants);
                }
            });

            // Initialize sample questions if they don't exist
            database.ref('questions').once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    const sampleQuestions = [
                        {
                            id: 0,
                            text: "What's your favorite season?",
                            options: ["Spring", "Summer", "Fall", "Winter"],
                            type: "4-option"
                        },
                        {
                            id: 1,
                            text: "Do you prefer tea or coffee?",
                            options: ["Tea", "Coffee"],
                            type: "2-option"
                        },
                        {
                            id: 2,
                            text: "What's your preferred work style?",
                            options: ["Remote", "Office", "Hybrid", "Flexible"],
                            type: "4-option"
                        },
                        {
                            id: 3,
                            text: "Are you a morning person?",
                            options: ["Yes", "No"],
                            type: "2-option"
                        }
                    ];
                    database.ref('questions').set(sampleQuestions);
                }
            });

            // Initialize game state if it doesn't exist
            database.ref('game').once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    database.ref('game').set({
                        currentQuestion: -1,
                        isActive: false,
                        timeRemaining: 45
                    });
                }
            });
        }

        function renderNameList(names) {
            nameList.innerHTML = '';
            names.forEach(name => {
                const nameItem = document.createElement('div');
                nameItem.className = 'name-item';
                nameItem.textContent = name;
                nameItem.addEventListener('click', () => selectName(name));
                nameList.appendChild(nameItem);
            });
        }

        function selectName(name) {
            selectedName = name;
            participantId = `participant_${participantNames.indexOf(name)}`;
            
            // Update UI
            document.querySelectorAll('.name-item').forEach(item => {
                item.classList.remove('selected');
                if (item.textContent === name) {
                    item.classList.add('selected');
                }
            });
            
            confirmBtn.disabled = false;
        }

        function setupEventListeners() {
            searchBox.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredNames = participantNames.filter(name => 
                    name.toLowerCase().includes(searchTerm)
                );
                renderNameList(filteredNames);
            });

            confirmBtn.addEventListener('click', enterGame);
        }

        function enterGame() {
            if (!selectedName) return;

            // Mark participant as active
            database.ref(`participants/${participantId}`).update({
                isActive: true
            });

            // Hide name selection and show game area
            nameSelection.style.display = 'none';
            gameArea.style.display = 'block';

            // Listen for game state changes
            listenForGameChanges();
        }

        function listenForGameChanges() {
            database.ref('game').on('value', (snapshot) => {
                const gameData = snapshot.val();
                if (!gameData) return;

                if (gameData.isActive && gameData.currentQuestion >= 0) {
                    loadQuestion(gameData.currentQuestion);
                    startTimer(gameData.timeRemaining || 45);
                } else {
                    showWaitingState();
                }
            });
        }

        function loadQuestion(questionId) {
            database.ref(`questions/${questionId}`).once('value', (snapshot) => {
                const questionData = snapshot.val();
                if (!questionData) return;

                currentQuestion = questionData;
                selectedAnswer = '';

                // Update UI
                status.textContent = 'Question Active - Select your answer!';
                status.className = 'status active';
                question.textContent = questionData.text;
                
                // Render options
                options.innerHTML = '';
                options.className = `options ${questionData.type === '2-option' ? 'two-options' : 'four-options'}`;
                
                questionData.options.forEach(option => {
                    const optionElement = document.createElement('div');
                    optionElement.className = 'option';
                    optionElement.textContent = option;
                    optionElement.addEventListener('click', () => selectAnswer(option));
                    options.appendChild(optionElement);
                });

                // Check if participant already answered this question
                database.ref(`answers/${questionId}/${participantId}`).once('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const existingAnswer = snapshot.val();
                        selectAnswer(existingAnswer, false);
                    }
                });
            });
        }

        function selectAnswer(answer, submit = true) {
            selectedAnswer = answer;
            
            // Update UI
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.textContent === answer) {
                    opt.classList.add('selected');
                }
            });

            if (submit) {
                submitAnswer(answer);
            }
        }

        function submitAnswer(answer) {
            if (!currentQuestion) return;

            database.ref(`answers/${currentQuestion.id}/${participantId}`).set(answer)
                .then(() => {
                    status.textContent = `Answer submitted: ${answer}`;
                    status.className = 'status submitted';
                })
                .catch(error => {
                    console.error('Error submitting answer:', error);
                });
        }

        function startTimer(duration) {
            timeRemaining = duration;
            timer.classList.remove('hidden');
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }

            timerInterval = setInterval(() => {
                timer.textContent = `Time: ${timeRemaining}s`;
                timeRemaining--;

                if (timeRemaining < 0) {
                    clearInterval(timerInterval);
                    timer.textContent = 'Time\'s up!';
                    freezeAnswers();
                }
            }, 1000);
        }

        function freezeAnswers() {
            // Disable all options
            document.querySelectorAll('.option').forEach(opt => {
                opt.style.pointerEvents = 'none';
                opt.style.opacity = '0.7';
            });
            
            status.textContent = 'Answers frozen - Waiting for next question...';
            status.className = 'status waiting';
        }

        function showWaitingState() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timer.classList.add('hidden');
            status.textContent = 'Waiting for next question...';
            status.className = 'status waiting';
            question.textContent = '';
            options.innerHTML = '';
        }

        // Initialize the app when the page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
